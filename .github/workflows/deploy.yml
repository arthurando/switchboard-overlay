name: Deploy — Switchboard

on:
  # push:                    # DISABLED 2026-03-20 — manual deploys only (save GHA minutes)
  #   branches: [master]
  workflow_dispatch:          # Emergency fallback only

concurrency:
  group: deploy-switchboard
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/arthurando/switchboard-overlay:latest
            ghcr.io/arthurando/switchboard-overlay:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sync production compose to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 37.27.93.188
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: docker-compose.prod.yml
          target: /opt/claude-code/services/
          strip_components: 0

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: 37.27.93.188
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GITHUB_TOKEN,GITHUB_ACTOR
          command_timeout: 10m
          script: |
            set -e
            mv /opt/claude-code/services/docker-compose.prod.yml /opt/claude-code/services/switchboard.yml
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            docker pull ghcr.io/arthurando/switchboard-overlay:latest
            cd /opt/claude-code
            docker compose up -d --no-deps --force-recreate switchboard
            for i in $(seq 1 12); do
              status=$(docker inspect switchboard --format '{{.State.Status}}' 2>/dev/null || echo starting)
              [ "$status" = "running" ] && break
              echo "Waiting... ($status) attempt $i/12"
              sleep 5
            done
            docker inspect switchboard --format '{{.State.Status}}' | grep -q running \
              && echo "✓ switchboard deployed $(date)" \
              || (echo "✗ switchboard failed to start" && exit 1)
            docker image prune --filter "until=72h" -f
