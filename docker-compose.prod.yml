# Single source of truth for the switchboard service on VPS.
# deploy.sh copies this to /opt/claude-code/services/switchboard.yml

services:
  switchboard:
    image: switchboard:latest
    container_name: switchboard
    restart: always
    security_opt:
      - no-new-privileges:true
    environment:
      NODE_ENV: production
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-switchboard}
      R2_DEV_SUBDOMAIN: ${R2_DEV_SUBDOMAIN:-pub-d16d5fcef9994fa7a95721e78b467451}
    networks:
      - claude-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  claude-net:
    external: true
    name: claude-code_claude-net
